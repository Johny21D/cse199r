<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header>
        <nav>

            <h1>World Book</h1>
            <ul>
                <li><a href="../World-Book.html">Home</a></li>
                <li><a href="../recipes/recipes.html">Recipes</a></li>
                <li><a href="../About.html">About Us</a></li>
            </ul>
        </nav>
    </header>

    <div class="form-container">
        <h2>Welcome Back!</h2>
        <p class="switch-text">Hungry for more? Log in to your kitchen.</p>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="login-email">Email Address</label>
                <input type="email" id="login-email" name="email" required>
            </div>
            <div class="input-group">
                <label for="login-password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="login-password" name="password" required>
                    <span class="eye-icon">
                        <i class="fa-regular fa-eye" style="color: grey;"></i>
                    </span>
                </div>
            </div>
            <button type="submit" class="btn-primary">Sign In</button>
            <p class="switch-text" style="margin-top: 20px;">
                New here? <a href="sign-up.html" style="color: var(--primary-color); font-weight: bold;">Create an account</a>
            </p>
            <p style="text-align:right; margin-top:-10px; margin-bottom:15px;">
                <a href="forgot-password.html" style="color:var(--accent-color); font-size:0.85rem;">Forgot Password?</a>
            </p>
        </form>
    </div>

    <footer>
        <p>&copy; 2026 World Book. All rights reserved.</p>
    </footer>

    <script type="module" src="../Auth/login.js"></script>
</body>
</html>
