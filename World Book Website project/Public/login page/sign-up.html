<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header>
        <nav>
            <img src="../images/Logo.png" alt="World Book Logo" id="logo">
            <h1>World Book</h1>
            <ul>
                <li><a href="../World-Book.html">Home</a></li>
                <li><a href="../recipes/recipes.html">Recipes</a></li>
                <li><a href="../About.html">About Us</a></li>
            </ul>
        </nav>
    </header>

    <div class="form-container">
        <h2>Create Account</h2>
        <form id="signupForm">
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required>
            </div>
            <div class="input-group">
                <label for="signup-email">Email</label>
                <input type="email" id="signup-email" name="email" required>
            </div>
            <div class="input-group">
                <label for="signup-phone">Phone Number (optional)</label>
                <input type="tel" id="signup-phone" name="phone" >
            </div>
            <div class="input-group">
                <label for="signup-password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="signup-password" name="password" required>
                    <span class="eye-icon"><i class="fa-regular fa-eye" style="color:grey;"></i></span>
                </div>
            </div>
            <button type="submit" class="btn-primary">Create Account</button>
            <p class="switch-text">Already have an account? <a href="login.html">Login</a></p>
        </form>
    </div>

    <footer>
        <p>&copy; 2026 World Book. All rights reserved.</p>
    </footer>

    <script type="module" src="../Auth/signup.js"></script>
</body>
</html>
