<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="../style.css"> 
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>

            <h1>World Book</h1>
        </nav>
    </header>

    <div class="form-container">
        <h2>Forgot Password?</h2>
        <p class="switch-text">Enter your email and we'll send you a reset link.</p>
        <form id="forgotForm">
            <div class="input-group">
                <label for="forgot-email">Email Address</label>
                <input type="email" id="forgot-email" required>
            </div>
            <button type="submit" class="btn-primary">Send Reset Link</button>
            <p class="switch-text" style="margin-top:20px;">
                <a href="login.html" style="color:var(--accent-color);font-weight:bold;">← Back to Login</a>
            </p>
        </form>
    </div>

    <footer>
        <p>&copy; 2026 World Book. All rights reserved.</p>
    </footer>

    <script type="module" src="../Auth/forgot-password.js"></script>
</body>
</html>
