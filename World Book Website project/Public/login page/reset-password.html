<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header>
        <nav>
            <img src="../images/Logo.png" alt="World Book Logo" id="logo">
            <h1>World Book</h1>
        </nav>
    </header>

    <div class="form-container">
        <h2>Reset Password</h2>
        <p class="switch-text">Enter your new password below.</p>
        <form id="resetForm">
            <div class="input-group">
                <label for="new-password">New Password</label>
                <div class="password-wrapper">
                    <input type="password" id="new-password" placeholder="••••••••" required>
                    <span class="eye-icon"><i class="fa-regular fa-eye" style="color:grey;"></i></span>
                </div>
            </div>
            <button type="submit" class="btn-primary">Reset Password</button>
        </form>
    </div>

    <footer>
        <p>&copy; 2026 World Book. All rights reserved.</p>
    </footer>

    <script type="module" src="../Auth/reset-password.js"></script>
</body>
</html>
